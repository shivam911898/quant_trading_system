[tool.ruff]
line-length = 100
target-version = "py310"
exclude = [
  ".venv",
  "__pycache__",
  "paper_runtime",
  "paper_runtime_ci",
  "paper_runtime_test",
]

[tool.ruff.lint]
select = ["E9", "F63", "F7", "F82"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
warn_unused_configs = true
follow_imports = "skip"
files = ["app_config.py", "app_logging.py", "main.py", "tests"]
exclude = "(^\\.venv/|^paper_runtime/|^paper_runtime_ci/|^paper_runtime_test/)"
